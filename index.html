<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi Tiêu Poll — Bình Chọn Khoản Chi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6af7;
    --accent2: #f76a8b;
    --accent3: #6af7c4;
    --text: #f0f0f8;
    --text-muted: #7070a0;
    --gold: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3rem 0 2rem;
  }

  .tag {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.25rem 0.75rem;
    border-radius: 100px;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-muted);
    margin-top: 0.75rem;
    font-size: 1rem;
    font-weight: 300;
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin: 2rem 0;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.5rem;
    text-align: center;
    transition: border-color 0.3s;
  }

  .stat-chip:hover { border-color: var(--accent); }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 0.25rem;
  }

  /* Main grid */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 2rem;
  }

  @media (max-width: 680px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.5rem;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  /* Vote Cards */
  .vote-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .vote-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .vote-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--card-color, var(--accent)), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .vote-card:hover { border-color: var(--card-color, var(--accent)); transform: translateX(4px); }
  .vote-card:hover::before { opacity: 0.07; }

  .vote-card.voted {
    border-color: var(--card-color, var(--accent));
    background: var(--surface);
  }

  .vote-card.voted::before { opacity: 0.1; }

  .card-emoji {
    font-size: 1.5rem;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-radius: 10px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .card-info {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .card-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    margin-top: 0.4rem;
    overflow: hidden;
  }

  .card-bar-fill {
    height: 100%;
    background: var(--card-color, var(--accent));
    border-radius: 100px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.2rem;
    position: relative;
    z-index: 1;
  }

  .card-votes {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .card-pct {
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .vote-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
    z-index: 2;
  }

  .vote-btn:hover {
    border-color: var(--card-color, var(--accent));
    color: var(--card-color, var(--accent));
    background: rgba(124,106,247,0.08);
  }

  .vote-btn.active {
    background: var(--card-color, var(--accent));
    border-color: var(--card-color, var(--accent));
    color: #fff;
  }

  /* Cooldown flash */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .vote-card.shake { animation: shake 0.3s ease; }

  /* Add form */
  .add-form {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .add-form input, .add-form select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 0.65rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input:focus, .add-form select:focus {
    border-color: var(--accent);
  }

  .add-form input { flex: 1; min-width: 140px; }

  .add-form select option { background: var(--surface2); }

  .btn-add {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    padding: 0.65rem 1.25rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #9580ff; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* Chart panel */
  .chart-panel {
    grid-column: 1 / -1;
  }

  @media (max-width: 680px) {
    .chart-panel { grid-column: 1; }
  }

  .chart-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    padding: 0.4rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .chart-wrap {
    position: relative;
    height: 280px;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    animation: toastIn 0.3s ease;
    border-left: 3px solid var(--accent3);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Live dot */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--accent3);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.08em;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent3);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 2rem;
    font-size: 0.9rem;
  }

  /* Floating ambient */
  .ambient {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
  }

  .ambient-1 {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -100px;
  }

  .ambient-2 {
    width: 300px; height: 300px;
    background: var(--accent2);
    bottom: -50px; right: -50px;
  }

  .cooldown-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--accent2);
    width: 100%;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform linear;
    border-radius: 0 0 14px 14px;
  }
</style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="container">
  <header>
    <div class="tag">Live Voting</div>
    <h1>Bình Chọn<br><span>Khoản Chi Tiêu</span></h1>
    <p class="subtitle">Chọn khoản chi bạn muốn ưu tiên — kết quả cập nhật ngay tức thì</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-chip">
      <span class="stat-num" id="totalVotes">0</span>
      <div class="stat-label">Tổng lượt vote</div>
    </div>
    <div class="stat-chip">
      <span class="stat-num" id="totalItems">0</span>
      <div class="stat-label">Khoản chi</div>
    </div>
    <div class="stat-chip">
      <span class="stat-num" id="leadingItem">—</span>
      <div class="stat-label">Dẫn đầu</div>
    </div>
    <div class="stat-chip">
      <span class="stat-num live-badge"><span class="live-dot"></span>LIVE</span>
      <div class="stat-label">Trạng thái</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- Voting Panel -->
    <div class="panel" style="grid-column: 1; grid-row: 1 / 3;">
      <div class="panel-title">Danh sách bình chọn</div>
      <div class="vote-list" id="voteList">
        <div class="empty">Thêm khoản chi để bắt đầu bình chọn 👇</div>
      </div>
    </div>

    <!-- Add Panel -->
    <div class="panel">
      <div class="panel-title">Thêm khoản chi</div>
      <div class="add-form">
        <input type="text" id="newItemName" placeholder="Tên khoản chi..." maxlength="30">
        <select id="newItemEmoji">
          <option value="🍔">🍔 Ăn uống</option>
          <option value="📚">📚 Học tập</option>
          <option value="🎮">🎮 Giải trí</option>
          <option value="✈️">✈️ Du lịch</option>
          <option value="🛍️">🛍️ Mua sắm</option>
          <option value="🏠">🏠 Nhà ở</option>
          <option value="💊">💊 Sức khỏe</option>
          <option value="🚗">🚗 Đi lại</option>
          <option value="💻">💻 Công nghệ</option>
          <option value="🎨">🎨 Sáng tạo</option>
          <option value="⚽">⚽ Thể thao</option>
          <option value="☕">☕ Café</option>
        </select>
        <button class="btn-add" onclick="addItem()">+ Thêm</button>
      </div>
    </div>

    <!-- Chart Panel -->
    <div class="panel">
      <div class="panel-title" style="justify-content: space-between;">
        <span>Biểu đồ kết quả</span>
        <div class="chart-tabs">
          <button class="tab-btn active" onclick="setChart('bar',this)">Cột</button>
          <button class="tab-btn" onclick="setChart('doughnut',this)">Tròn</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="myChart"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ─── State ───────────────────────────────────────────────
const COOLDOWN_MS = 3000; // 3s anti-spam

const COLORS = [
  '#7c6af7','#f76a8b','#6af7c4','#f5c842',
  '#f7a26a','#6ab4f7','#c46af7','#6af795',
  '#f76a6a','#6af7e8','#f7e86a','#a2f76a'
];

let items = JSON.parse(localStorage.getItem('poll_items') || 'null') || [
  { id: 1, name: 'Ăn uống', emoji: '🍔', votes: 12 },
  { id: 2, name: 'Học tập', emoji: '📚', votes: 8 },
  { id: 3, name: 'Giải trí', emoji: '🎮', votes: 15 },
  { id: 4, name: 'Du lịch', emoji: '✈️', votes: 5 },
  { id: 5, name: 'Mua sắm', emoji: '🛍️', votes: 9 },
];

let userVotes = JSON.parse(localStorage.getItem('poll_votes') || '{}');
let cooldowns = {};
let chartType = 'bar';
let chart = null;
let nextId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;

// ─── Save ─────────────────────────────────────────────────
function save() {
  localStorage.setItem('poll_items', JSON.stringify(items));
  localStorage.setItem('poll_votes', JSON.stringify(userVotes));
}

// ─── Render ───────────────────────────────────────────────
function render() {
  const list = document.getElementById('voteList');
  const total = items.reduce((s, i) => s + i.votes, 0);

  if (!items.length) {
    list.innerHTML = '<div class="empty">Thêm khoản chi để bắt đầu bình chọn 👇</div>';
  } else {
    list.innerHTML = items.map((item, idx) => {
      const pct = total ? Math.round((item.votes / total) * 100) : 0;
      const color = COLORS[idx % COLORS.length];
      const voted = userVotes[item.id];
      return `
        <div class="vote-card ${voted ? 'voted' : ''}" id="card-${item.id}"
             style="--card-color: ${color}; animation-delay: ${idx * 0.06}s">
          <div class="card-emoji">${item.emoji}</div>
          <div class="card-info">
            <div class="card-name">${item.name}</div>
            <div class="card-bar-bg">
              <div class="card-bar-fill" id="bar-${item.id}" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="card-right">
            <span class="card-votes" style="color:${color}">${item.votes}</span>
            <span class="card-pct">${pct}%</span>
          </div>
          <button class="vote-btn ${voted ? 'active' : ''}" onclick="vote(${item.id}, event)">
            ${voted ? '✓ Đã vote' : '+ Vote'}
          </button>
          <div class="cooldown-bar" id="cd-${item.id}"></div>
        </div>`;
    }).join('');
  }

  // Stats
  document.getElementById('totalVotes').textContent = total;
  document.getElementById('totalItems').textContent = items.length;
  const leader = items.reduce((a, b) => b.votes > a.votes ? b : a, {votes:-1,name:'—'});
  document.getElementById('leadingItem').textContent = leader.name !== '—' ? leader.emoji : '—';

  updateChart();
  save();
}

// ─── Vote ─────────────────────────────────────────────────
function vote(id, e) {
  e.stopPropagation();
  const card = document.getElementById(`card-${id}`);

  // Anti-spam cooldown
  if (cooldowns[id]) {
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 300);
    showToast('⏳ Chờ chút trước khi vote lại!', 'warn');
    return;
  }

  const item = items.find(i => i.id === id);
  if (!item) return;

  if (userVotes[id]) {
    // Unvote
    item.votes = Math.max(0, item.votes - 1);
    delete userVotes[id];
    showToast(`↩️ Đã hủy vote ${item.emoji} ${item.name}`);
  } else {
    // Vote
    item.votes++;
    userVotes[id] = true;
    showToast(`🎉 Đã vote cho ${item.emoji} ${item.name}!`);
  }

  // Cooldown
  cooldowns[id] = true;
  const cdBar = document.getElementById(`cd-${id}`);
  if (cdBar) {
    cdBar.style.transition = 'none';
    cdBar.style.transform = 'scaleX(1)';
    requestAnimationFrame(() => {
      cdBar.style.transition = `transform ${COOLDOWN_MS}ms linear`;
      cdBar.style.transform = 'scaleX(0)';
    });
  }
  setTimeout(() => { delete cooldowns[id]; }, COOLDOWN_MS);

  render();
}

// ─── Add Item ─────────────────────────────────────────────
function addItem() {
  const nameEl = document.getElementById('newItemName');
  const emojiEl = document.getElementById('newItemEmoji');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  const emoji = emojiEl.value;
  items.push({ id: nextId++, name, emoji, votes: 0 });
  nameEl.value = '';
  showToast(`✅ Đã thêm ${emoji} ${name}`);
  render();
}

document.getElementById('newItemName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// ─── Chart ────────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: chartType,
    data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
    options: getChartOptions(),
  });
}

function getChartOptions() {
  const base = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 600, easing: 'easeInOutQuart' },
    plugins: {
      legend: {
        display: chartType === 'doughnut',
        labels: { color: '#f0f0f8', font: { family: 'DM Sans' }, padding: 12 }
      },
      tooltip: {
        backgroundColor: '#1c1c28',
        borderColor: '#2a2a3d',
        borderWidth: 1,
        titleColor: '#f0f0f8',
        bodyColor: '#7070a0',
        callbacks: {
          label: ctx => {
            const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
            const pct = total ? Math.round(ctx.raw/total*100) : 0;
            return ` ${ctx.raw} vote (${pct}%)`;
          }
        }
      }
    }
  };

  if (chartType === 'bar') {
    base.scales = {
      x: {
        ticks: { color: '#7070a0', font: { family: 'DM Sans', size: 11 } },
        grid: { color: '#1c1c28' },
      },
      y: {
        ticks: { color: '#7070a0', font: { family: 'DM Sans', size: 11 } },
        grid: { color: '#1c1c28' },
        beginAtZero: true,
      }
    };
  }

  return base;
}

function updateChart() {
  if (!chart) return;
  const labels = items.map(i => `${i.emoji} ${i.name}`);
  const data = items.map(i => i.votes);
  const colors = items.map((_, idx) => COLORS[idx % COLORS.length]);

  chart.data.labels = labels;
  chart.data.datasets[0].data = data;
  chart.data.datasets[0].backgroundColor = colors;
  chart.data.datasets[0].borderColor = colors;
  chart.data.datasets[0].borderWidth = chartType === 'bar' ? 0 : 2;
  chart.data.datasets[0].borderRadius = chartType === 'bar' ? 8 : 0;
  chart.data.datasets[0].hoverOffset = 8;
  chart.update('active');
}

function setChart(type, btn) {
  chartType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (chart) chart.destroy();
  chart = null;
  initChart();
  render();
}

// ─── Toast ────────────────────────────────────────────────
function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeftColor = type === 'warn' ? 'var(--accent2)' : 'var(--accent3)';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ─── Init ─────────────────────────────────────────────────
initChart();
render();
</script>
</body>
</html>
